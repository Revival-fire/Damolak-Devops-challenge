name: CI/CD Pipeline
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "prod"
        type: choice
        options: [prod, staging]

env:
  AWS_REGION:    us-east-1
  ECR_REPO_NAME: devops-challenge-prod
  ECS_CLUSTER:   devops-challenge-prod-cluster
  ECS_SERVICE:   devops-challenge-prod-service
  TF_VERSION:    1.7.5
  NODE_VERSION:  "20"

# Limit concurrent prod deploys — cancel in-flight runs on new push
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  test:
    name: "Test"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:ci

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: app/coverage/
          retention-days: 14

  build:
    name: "Build & Push"
    runs-on: ubuntu-latest
    needs: test
    # Only build on push to main or manual dispatch
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
      ecr_registry: ${{ steps.login-ecr.outputs.registry }}

    permissions:
      id-token: write   # for OIDC auth to AWS
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Generate image metadata
        id: meta
        run: |
          SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "image_tag=sha-${SHA}" >> "$GITHUB_OUTPUT"
          echo "Image tag: sha-${SHA}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./app
          file: ./app/Dockerfile
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPO_NAME }}:sha-${{ steps.meta.outputs.image_tag }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPO_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPO_NAME }}:sha-${{ steps.meta.outputs.image_tag }}
          format: "table"
          exit-code: "0"           # warn but don't block (set to 1 to enforce)
          ignore-unfixed: true
          severity: "CRITICAL,HIGH"

  terraform-plan:
    name: "Terraform Plan"
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    permissions:
      id-token: write
      contents: read
      pull-requests: write

    defaults:
      run:
        working-directory: terraform

    env:
      TF_VAR_image_tag: ${{ needs.build.outputs.image_tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Terraform ${{ env.TF_VERSION }}
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="dynamodb_table=${{ secrets.TF_LOCK_TABLE }}"

      - name: Terraform Format check
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        run: terraform plan -out=tfplan -input=false

      - name: Upload Terraform plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: terraform/tfplan
          retention-days: 1

  deploy:
    name: "Deploy to ${{ github.event.inputs.environment || 'prod' }}"
    runs-on: ubuntu-latest
    needs: [build, terraform-plan]
    environment:
      name: ${{ github.event.inputs.environment || 'production' }}
      url: http://${{ steps.get-alb.outputs.dns }}

    permissions:
      id-token: write
      contents: read

    defaults:
      run:
        working-directory: terraform

    env:
      TF_VAR_image_tag: ${{ needs.build.outputs.image_tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Terraform ${{ env.TF_VERSION }}
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Download Terraform plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: terraform/

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="dynamodb_table=${{ secrets.TF_LOCK_TABLE }}"

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan

      - name: Get ALB DNS name
        id: get-alb
        run: |
          DNS=$(terraform output -raw alb_dns_name)
          echo "dns=${DNS}" >> "$GITHUB_OUTPUT"
          echo "App URL: http://${DNS}"

      - name: Wait for ECS service stability
        run: |
          aws ecs wait services-stable \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services ${{ env.ECS_SERVICE }} \
            --region ${{ env.AWS_REGION }}

      - name: Smoke test
        run: |
          ALB_DNS="${{ steps.get-alb.outputs.dns }}"
          echo "Running smoke tests against http://${ALB_DNS}"

          # Health endpoint
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --retry 5 --retry-delay 10 http://${ALB_DNS}/health)
          if [ "$HTTP_CODE" != "200" ]; then
            echo "❌ /health returned ${HTTP_CODE}"
            exit 1
          fi
          echo "✅ /health → 200 OK"

          # Root endpoint
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://${ALB_DNS}/)
          if [ "$HTTP_CODE" != "200" ]; then
            echo "❌ / returned ${HTTP_CODE}"
            exit 1
          fi
          echo "✅ / → 200 OK"

      - name: Notify success
        if: success()
        run: |
          echo "🚀 Deployment successful!"
          echo "Image tag : ${{ needs.build.outputs.image_tag }}"
          echo "App URL   : http://${{ steps.get-alb.outputs.dns }}"

      - name: Rollback on failure
        if: failure()
        run: |
          echo "❌ Deployment failed — triggering ECS rollback"
          # ECS deployment circuit breaker handles auto-rollback
          # Force a re-deploy of the previous task definition revision
          PREV_REVISION=$(aws ecs describe-services \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services ${{ env.ECS_SERVICE }} \
            --query 'services[0].deployments[1].taskDefinition' \
            --output text)
          if [ -n "$PREV_REVISION" ] && [ "$PREV_REVISION" != "None" ]; then
            aws ecs update-service \
              --cluster ${{ env.ECS_CLUSTER }} \
              --service ${{ env.ECS_SERVICE }} \
              --task-definition "$PREV_REVISION"
            echo "Rolled back to: $PREV_REVISION"
          fi
